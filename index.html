<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>OKLCH Palette System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <aside id="sidebar">
    <div id="contrast-controls-top" style="display: none;">
        <section class="sidebar-section">
            <h3>Ustawienia Kontrastu</h3>
            <div class="group">
                <div id="active-bg-source-top" style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 8px;">Tło z: Paleta Główna</div>
                <label>Jasność tła</label>
                <input type="range" id="contrast-brightness-top" min="0" max="1" step="0.01" value="0.5">
                <label>Boost kontrastu</label>
                <input type="range" id="contrast-boost-top" min="0" max="5" step="0.1" value="0">

                <div id="ignore-thresholds-top" style="margin-top: 12px;">
                    <label style="font-size: 0.75rem; display: block; margin-bottom: 8px;">Ignoruj progi:</label>

                    <div class="ignore-group">
                        <span>Relatywne do Tła (BG):</span>
                        <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;">
                            <button class="ignore-btn" data-val="L1_BG">Lvl1 (3:1)</button>
                            <button class="ignore-btn" data-val="C45_BG">AA (4.5:1)</button>
                            <button class="ignore-btn" data-val="C7_BG">AAA (7:1)</button>
                        </div>
                    </div>

                    <div class="ignore-group" style="margin-top: 8px;">
                        <span>Relatywne do Lvl1:</span>
                        <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;">
                            <button class="ignore-btn" data-val="L2_L1">Lvl2 (3:1)</button>
                            <button class="ignore-btn" data-val="C45_L1">AA (4.5:1)</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <section class="sidebar-section">
      <h3>Kolor bazowy</h3>
      <div class="group">
        <div id="basePreview" class="big-swatch"></div>
        <label>HEX / RGB</label>
        <input id="textColor" placeholder="#7c6cff lub rgb(124,108,255)" />
        <input type="color" id="baseColor" value="#7c6cff" style="visibility: hidden; height: 0; padding: 0; margin: 0; position: absolute;" />
      </div>
    </section>

    <section class="sidebar-section">
      <h3>Konfiguracja palety</h3>
      <div class="group">
        <div id="batchContainer"></div>

        <label>Granulacja skali</label>
        <div class="granularity-btns">
            <button class="gran-btn" data-val="10">10</button>
            <button class="gran-btn" data-val="50">50</button>
            <button class="gran-btn active" data-val="100">100</button>
        </div>

        <label>Algorytm</label>
        <div class="toggle-group">
          <input type="radio" name="algoMode" id="algo-standard" value="standard" checked>
          <label for="algo-standard">Standard</label>
          <input type="radio" name="algoMode" id="algo-adaptive" value="adaptive">
          <label for="algo-adaptive">Adaptive</label>
        </div>

        <label>Rozkład jasności (Distribution)</label>
        <div class="toggle-group">
          <input type="radio" name="scaleMode" id="scale-absolute" value="absolute" checked>
          <label for="scale-absolute">Absolute</label>
          <input type="radio" name="scaleMode" id="scale-asymmetric" value="asymmetric">
          <label for="scale-asymmetric">Asymmetric</label>
        </div>

        <label>Relacja kolorystyczna</label>
        <select id="harmony">
          <option value="custom">Custom</option>
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="split">Split complementary</option>
          <option value="triadic">Triadic</option>
          <option value="tetradic">Tetradic</option>
          <option value="warmcool">Warm / cool</option>
        </select>

        <label>Tryb palety (Light/Dark)</label>
        <select id="mode">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>

        <label>Podgląd tła (UI Preview)</label>
        <select id="previewBg">
          <option value="light">Jasne</option>
          <option value="dark">Ciemne</option>
        </select>
      </div>
    </section>

    <section class="sidebar-section">
      <h3>Kolory dodatkowe</h3>
      <div class="group">
          <input id="addManualColorInput" placeholder="#hex lub rgb()" style="margin-bottom: 8px;">
          <button id="addManualColorBtn">Dodaj ten kolor</button>
          <div id="manualColorMsg" style="font-size: 0.75rem; color: #ffca28; margin-top: 4px;"></div>
          <button id="addColor" style="margin-top: 8px;">Dodaj auto kolor</button>
          <button id="addGrayBtn" style="margin-top: 8px; background: #555;">Dodaj paletę szarości</button>
      </div>
      <div id="colorList"></div>
    </section>

  </aside>

  <main id="output-container">
    <div class="tabs">
        <button class="tab-btn active" data-view="palettes">Palety</button>
        <button class="tab-btn" data-view="contrast">Kontrast</button>
    </div>
    <div id="output" class="preview-light"></div>
  </main>

  <script type="module">
    import { initControls } from './ui/ui.controls.js';
    import { renderAllPalettes } from './ui/ui.render.js';
    import { renderAllGradients } from './ui/ui.gradients.js';
    import { renderMessages } from './ui/ui.messages.js';

    initControls();
    if (window.refreshUI) {
        window.refreshUI();
    } else {
        renderAllPalettes();
        renderAllGradients();
        renderMessages();
    }

    // reaguj na zmiany tła preview
    document.getElementById('previewBg')?.addEventListener('change', e => {
      const out = document.getElementById('output');
      if (e.target.value === 'dark') {
          out.classList.add('preview-dark');
          out.classList.remove('preview-light');
      } else {
          out.classList.add('preview-light');
          out.classList.remove('preview-dark');
      }
    });
  </script>
</body>
</html>
