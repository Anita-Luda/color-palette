<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>OKLCH Palette System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <aside id="sidebar">
    <!-- SEKCOJA: WIDOK (STICKY) -->
    <section class="sidebar-section sticky-top">
        <div class="toggle-group">
          <input type="radio" name="viewMode" id="view-palettes" value="palettes" checked>
          <label for="view-palettes">Palety</label>
          <input type="radio" name="viewMode" id="view-contrast" value="contrast">
          <label for="view-contrast">Kontrast</label>
        </div>
    </section>

    <!-- SEKCOJA: USTAWIENIA PANELU -->
    <section class="sidebar-section collapsible" id="sec-panel-settings">
      <div class="sidebar-header">
          <h3>Ustawienia Panelu</h3>
          <button id="hide-panel-btn" class="btn-hide">UKRYJ</button>
      </div>
      <div class="group collapsible-content">
          <label>Pozycja panelu</label>
          <div class="pos-btn-group">
            <button class="pos-btn" data-val="left" title="Lewo">←</button>
            <button class="pos-btn" data-val="right" title="Prawo">→</button>
            <button class="pos-btn" data-val="top" title="Góra">↑</button>
            <button class="pos-btn" data-val="bottom" title="Dół">↓</button>
            <button class="pos-btn" data-val="floating" title="Pływający">⬚</button>
          </div>
          <label>Motyw Panelu</label>
          <div class="toggle-group discreet">
            <input type="radio" name="sbTheme" id="sb-dark" value="dark" checked>
            <label for="sb-dark">Dark</label>
            <input type="radio" name="sbTheme" id="sb-light" value="light">
            <label for="sb-light">Light</label>
          </div>
          <label>Podgląd tła (UI Preview)</label>
          <div class="toggle-group discreet">
            <input type="radio" name="previewBg" id="pbg-light" value="light" checked>
            <label for="pbg-light">Jasne</label>
            <input type="radio" name="previewBg" id="pbg-dark" value="dark">
            <label for="pbg-dark">Ciemne</label>
          </div>
      </div>
    </section>

    <!-- SEKCOJA: TRYB PALETY -->
    <section class="sidebar-section">
        <label>Tryb palety (Algorytm główny)</label>
        <div class="toggle-group">
            <input type="radio" name="mode" id="mode-light" value="light" checked>
            <label for="mode-light">LIGHT</label>
            <input type="radio" name="mode" id="mode-dark" value="dark">
            <label for="mode-dark">DARK</label>
        </div>
    </section>

    <!-- SEKCOJA: USTAWIENIA KONTRASTU (widoczne tylko w widoku kontrastu) -->
    <section class="sidebar-section collapsible" id="sec-contrast" style="display: none;">
        <div class="sidebar-header"><h3>Ustawienia Kontrastu</h3></div>
        <div class="group collapsible-content">
            <label>Algorytm kontrastu</label>
            <div class="toggle-group discreet">
                <input type="radio" name="contrastAlgo" id="algo-wcag" value="wcag" checked>
                <label for="algo-wcag">WCAG 2.1</label>
                <input type="radio" name="contrastAlgo" id="algo-apca" value="apca">
                <label for="algo-apca">APCA (V3)</label>
            </div>
            <div id="active-bg-source-top" style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 8px; margin-top: 12px;">Tło z: Paleta Główna</div>
            <label>Jasność tła</label>
            <input type="range" id="contrast-brightness-top" min="0" max="1" step="0.01" value="0.5">
            <label>Boost kontrastu</label>
            <input type="range" id="contrast-boost-top" min="0" max="5" step="0.1" value="0">

            <div id="ignore-thresholds-top" style="margin-top: 12px;">
                <label style="font-size: 0.75rem; display: block; margin-bottom: 8px;">Ignoruj progi:</label>
                <div class="ignore-group">
                    <span>Relatywne do Tła:</span>
                    <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;">
                        <button class="ignore-btn" data-val="L1_BG">L1</button>
                        <button class="ignore-btn" data-val="C45_BG">AA</button>
                        <button class="ignore-btn" data-val="C7_BG">AAA</button>
                    </div>
                </div>
                <div class="ignore-group" style="margin-top: 8px;">
                    <span>Relatywne do L1:</span>
                    <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;">
                        <button class="ignore-btn" data-val="L2_L1">L2</button>
                        <button class="ignore-btn" data-val="C45_L1">AA</button>
                        <button class="ignore-btn" data-val="BASE_L1">Base</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- SEKCOJA: KOLOR BAZOWY -->
    <section class="sidebar-section collapsible" id="sec-base-color">
      <div class="sidebar-header"><h3>Kolor bazowy</h3></div>
      <div class="group collapsible-content">
        <div id="basePreview" class="big-swatch"></div>
        <label>HEX / RGB</label>
        <input id="textColor" placeholder="#7c6cff lub rgb(124,108,255)" />
        <input type="color" id="baseColor" value="#7c6cff" style="visibility: hidden; height: 0; padding: 0; margin: 0; position: absolute;" />
      </div>
    </section>

    <!-- SEKCOJA: KONFIGURACJA PALETY -->
    <section class="sidebar-section collapsible" id="sec-config">
      <div class="sidebar-header"><h3>Konfiguracja palety</h3></div>
      <div class="group collapsible-content">
        <label>Algorytm</label>
        <div class="toggle-group">
          <input type="radio" name="algoMode" id="algo-standard" value="standard" checked>
          <label for="algo-standard">Standard</label>
          <input type="radio" name="algoMode" id="algo-adaptive" value="adaptive">
          <label for="algo-adaptive">Adaptive</label>
        </div>

        <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="boost-toggle" style="width: auto;">
            <label for="boost-toggle" style="margin-bottom: 0; cursor: pointer;">Dark Mode Boost (Korekta jasnych tonów)</label>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="neon-toggle" style="width: auto;">
            <label for="neon-toggle" style="margin-bottom: 0; cursor: pointer;">Neon Boost (Maksymalne nasycenie)</label>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="pastel-toggle" style="width: auto;">
            <label for="pastel-toggle" style="margin-bottom: 0; cursor: pointer;">Pastel Boost (Łagodne, jasne tony)</label>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="glass-toggle" style="width: auto;">
            <label for="glass-toggle" style="margin-bottom: 0; cursor: pointer;">Glassmorphism Boost (Pod przezroczystość)</label>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="ink-toggle" style="width: auto;">
            <label for="ink-toggle" style="margin-bottom: 0; cursor: pointer;">Ink-Save Mode (Optymalizacja pod druk)</label>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="spectral-toggle" style="width: auto;">
            <label for="spectral-toggle" style="margin-bottom: 0; cursor: pointer;">Spectral Balance (Korekta jasności H-K)</label>
          </div>
        </div>

        <label>Rozkład jasności</label>
        <div class="toggle-group">
          <input type="radio" name="scaleMode" id="scale-absolute" value="absolute" checked>
          <label for="scale-absolute">Abs</label>
          <input type="radio" name="scaleMode" id="scale-asymmetric" value="asymmetric">
          <label for="scale-asymmetric">Asym</label>
          <input type="radio" name="scaleMode" id="scale-fixed" value="fixed">
          <label for="scale-fixed">Fixed</label>
        </div>

        <label>Granulacja skali</label>
        <div class="granularity-btns">
            <button class="gran-btn" data-val="10">10</button>
            <button class="gran-btn" data-val="50">50</button>
            <button class="gran-btn active" data-val="100">100</button>
        </div>

        <label>Relacja kolorystyczna</label>
        <select id="harmony">
          <option value="custom">Custom</option>
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="split">Split complementary</option>
          <option value="triadic">Triadic</option>
          <option value="tetradic">Tetradic</option>
          <option value="warmcool">Warm / cool</option>
        </select>

        <div id="batchContainer"></div>
      </div>
    </section>


    <!-- SEKCOJA: KOLORY DODATKOWE -->
    <section class="sidebar-section collapsible" id="sec-additional">
      <div class="sidebar-header"><h3>Kolory dodatkowe</h3></div>
      <div class="group collapsible-content">
          <input id="addManualColorInput" placeholder="#hex lub rgb()" style="margin-bottom: 8px;">
          <button id="addManualColorBtn">Dodaj ten kolor</button>
          <div id="manualColorMsg" style="font-size: 0.75rem; color: #ffca28; margin-top: 4px;"></div>
          <button id="addColor" style="margin-top: 8px;">Dodaj auto kolor</button>
          <button id="addGrayBtn" style="margin-top: 8px; background: #555;">Dodaj paletę szarości</button>
          <div id="colorList"></div>
      </div>
    </section>

    <!-- EKSPORT -->
    <section class="sidebar-section">
        <h3>Eksport</h3>
        <div class="group">
            <button id="export-figma-btn" data-type="main">Figma: Palety Główne</button>
            <button id="export-figma-func-btn" data-type="functional">Figma: Funkcjonalna</button>
            <button id="export-figma-badge-btn" data-type="badge">Figma: Badge</button>
            <button id="export-figma-contrast-btn" data-type="contrast">Figma: Kontrasty</button>
            <button id="copy-hex-list-btn">Copy HEX List</button>
        </div>
    </section>

  </aside>

  <main id="output-container">
    <div id="output" class="preview-light"></div>
  </main>

  <button id="panel-toggle" title="Pokaż panel">☰</button>

  <script type="module">
    import { initControls } from './ui/ui.controls.js';
    import { renderAllPalettes } from './ui/ui.render.js';
    import { renderAllGradients } from './ui/ui.gradients.js';
    import { renderMessages } from './ui/ui.messages.js';

    initControls();
    window.refreshUI();

    // reaguj na zmiany tła preview
    document.getElementById('previewBg')?.addEventListener('change', e => {
      const out = document.getElementById('output');
      if (e.target.value === 'dark') {
          out.classList.add('preview-dark');
          out.classList.remove('preview-light');
      } else {
          out.classList.add('preview-light');
          out.classList.remove('preview-dark');
      }
    });
  </script>
</body>
</html>
